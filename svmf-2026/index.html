<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>SVMF 2026 — Geologic uncertainty, quantified · Juan Pablo Daza</title>

<!-- Open Graph / link previews -->
<meta property="og:type" content="website">
<meta property="og:title" content="Geologic uncertainty, quantified — SVMF 2026">
<meta property="og:description" content="Strong deformation breaks most models. Ours is built for it. Thousands of times.">
<meta property="og:image" content="https://jpdaza.github.io/svmf-2026/summary.png">
<meta property="og:url" content="https://jpdaza.github.io/svmf-2026/">

<style>
  :root{
    --bg:#14110e;
    --panel:#1d1a16;
    --cream:#f4efe6;
    --text:#f4efe6;
    --muted:#b9b1a4;
    --muted2:#8a8377;
    --cardinal:#b83a36;
    --line:rgba(244,239,230,.12);
    --sans:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    --mono:ui-monospace,"SF Mono","JetBrains Mono",Menlo,Consolas,monospace;
    --serif:"DM Serif Display",Georgia,"Times New Roman",serif;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{background:var(--bg);color:var(--text);}
  body{
    font-family:var(--sans);
    min-height:100svh;
    display:flex;flex-direction:column;
    padding:max(18px,env(safe-area-inset-top)) 18px max(22px,env(safe-area-inset-bottom));
    gap:18px;
    -webkit-font-smoothing:antialiased;
  }

  /* ---- top brand line ---- */
  header{
    display:flex;align-items:baseline;gap:.6em;flex-wrap:wrap;
    font-family:var(--mono);font-size:12px;letter-spacing:.14em;text-transform:uppercase;
    color:var(--muted2);
  }
  header .cx{color:var(--cardinal);font-weight:600;}
  header .sep{color:var(--line);}

  /* ---- the slide ---- */
  main{flex:1 1 auto;display:flex;align-items:center;justify-content:center;min-height:0;}
  .frame{
    width:100%;max-width:1180px;
    border-radius:8px;overflow:hidden;
    box-shadow:0 18px 60px rgba(0,0,0,.55), 0 0 0 1px var(--line);
    background:#fff;
    line-height:0;
  }
  .frame img{width:100%;height:auto;display:block;}
  .frame a{display:block;}

  .hint{
    margin-top:10px;text-align:center;
    font-family:var(--mono);font-size:11px;letter-spacing:.08em;text-transform:uppercase;
    color:var(--muted2);
  }
  .hint a{color:var(--muted);text-decoration:none;border-bottom:1px solid var(--line);}
  .hint a:hover{color:var(--cream);}

  /* ---- demo video (below the slide) ---- */
  .demo{width:100%;max-width:1180px;margin:0 auto;}
  .demo .cap{
    display:flex;align-items:center;gap:.7em;margin-bottom:10px;
    font-family:var(--mono);font-size:11px;letter-spacing:.14em;text-transform:uppercase;
    color:var(--muted2);
  }
  .demo .cap::before{content:"";flex:0 0 22px;height:1px;background:var(--cardinal);}
  .demo .cap b{color:var(--cardinal);font-weight:600;}
  .demo .vidframe{
    border-radius:8px;overflow:hidden;line-height:0;
    box-shadow:0 18px 60px rgba(0,0,0,.55), 0 0 0 1px var(--line);
    background:#000;
  }
  .demo video{width:100%;height:auto;display:block;}

  /* ---- footer ---- */
  footer{
    display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;
    padding-top:14px;border-top:1px solid var(--line);
  }
  footer .who{font-size:15px;color:var(--text);}
  footer .who b{font-weight:600;}
  footer .who .aff{display:block;margin-top:3px;font-size:12.5px;color:var(--muted2);}
  footer .eml{
    font-family:var(--mono);font-size:13px;color:var(--cream);
    text-decoration:none;border-bottom:1px solid var(--cardinal);padding-bottom:1px;
    white-space:nowrap;
  }
  footer .eml:hover{color:#fff;}

  @media (max-width:540px){
    header{font-size:10.5px;letter-spacing:.1em;}
    footer .who{font-size:14px;}
  }
</style>
</head>
<body>
  <header>
    <span><span class="cx">Stanford</span> University</span>
    <span class="sep">·</span>
    <span>Mineral-X</span>
    <span class="sep">·</span>
    <span>SVMF 2026</span>
  </header>

  <main>
    <div>
      <div class="frame">
        <a href="summary-hires.png" title="Open full-resolution slide (8K)">
          <img src="summary.png"
               alt="Strong deformation breaks most models. Ours is built for it — thousands of times. Ensemble of equally-valid 3D geologic models honoring every drillhole pick.">
        </a>
      </div>
      <p class="hint">Tap the slide to open <a href="summary-hires.png">full resolution</a> · pinch to zoom</p>

      <div class="demo">
        <div class="cap"><b>Demo</b> · MacPass "Tom" · ∞ models, same data</div>
        <div class="vidframe">
          <video src="demo.mp4" autoplay loop muted playsinline controls preload="metadata"
                 poster="demo-poster.jpg" aria-label="Animated demo: ensemble of equally-valid 3D geologic models">
          </video>
        </div>
      </div>
    </div>
  </main>

  <footer>
    <div class="who">
      <b>Juan Pablo Daza</b> · Jef Caers
      <span class="aff">Stanford Doerr School of Sustainability · Mineral-X · SCRF</span>
    </div>
    <a class="eml" href="mailto:jpdaza@stanford.edu">jpdaza@stanford.edu</a>
  </footer>
</body>
</html>
